<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gradient bg-primary-subtle min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-5">
                <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 450px;">
                    <div class="card-header bg-primary text-white text-center py-4 border-0 rounded-top-4">
                        <i class="bi bi-shield-lock fs-1 mb-3"></i>
                        <h2 class="h3 fw-bold mb-0">Вход в аккаунт</h2>
                    </div>
                    <div class="card-body p-5">
                        <form method="post" action="{% url 'account_login' %}">
                            {% csrf_token %}

                            <div class="input-group input-group-lg mb-4">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.login.id_for_label }}"
                                       name="{{ form.login.name }}"
                                       placeholder="Логин или email"
                                       required>
                            </div>

                            <div class="input-group input-group-lg mb-4">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.password.id_for_label }}"
                                       name="{{ form.password.name }}"
                                       placeholder="Пароль"
                                       required>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    {{ form.remember }}
                                    <label class="form-check-label ms-2" for="{{ form.remember.id_for_label }}">
                                        Запомнить меня
                                    </label>
                                </div>
                                <a href="{% url 'account_reset_password' %}" class="btn btn-link p-0 text-decoration-none text-body fw-semibold">Забыли пароль?</a>
                            </div>

                            {% if redirect_field_value %}
                            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                            {% endif %}

                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-semibold mb-4 shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Войти в аккаунт
                            </button>
                        </form>

                        <div class="text-center pt-4 border-top">
                            <span class="text-muted small me-3">Нет аккаунта?</span>
                            <a href="{% url 'account_signup' %}" class="btn btn-link p-0 text-decoration-none fw-semibold text-primary">Зарегистрироваться</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
