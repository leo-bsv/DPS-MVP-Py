<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gradient bg-primary-subtle min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-5">
                <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 450px;">
                    <div class="card-header bg-primary text-white text-center py-4 border-0 rounded-top-4">
                        <i class="bi bi-person-plus fs-1 mb-3"></i>
                        <h2 class="h3 fw-bold mb-0">Создать аккаунт</h2>
                    </div>
                    <div class="card-body p-5">
                        <form method="post" action="{% url 'account_signup' %}">
                            {% csrf_token %}

                            <div class="input-group input-group-lg mb-4">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.username.id_for_label }}"
                                       name="{{ form.username.name }}"
                                       placeholder="Имя пользователя"
                                       required>
                            </div>

                            <div class="input-group input-group-lg mb-4">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-envelope text-muted"></i>
                                </span>
                                <input type="email"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.email.id_for_label }}"
                                       name="{{ form.email.name }}"
                                       placeholder="Email"
                                       required>
                            </div>

                            <div class="input-group input-group-lg mb-4">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.password1.id_for_label }}"
                                       name="{{ form.password1.name }}"
                                       placeholder="Пароль"
                                       required>
                            </div>

                            <div class="input-group input-group-lg mb-3">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       class="form-control border-start-0 fs-6"
                                       id="{{ form.password2.id_for_label }}"
                                       name="{{ form.password2.name }}"
                                       placeholder="Подтвердите пароль">
                            </div>

                            {% if redirect_field_value %}
                            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                            {% endif %}

                            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-semibold mb-4 shadow-sm">
                                <i class="bi bi-check-lg me-2"></i>
                                Зарегистрироваться
                            </button>
                        </form>

                        <div class="text-center pt-4 border-top">
                            <span class="text-muted small me-3">Уже есть аккаунт?</span>
                            <a href="{% url 'account_login' %}" class="btn btn-link p-0 text-decoration-none text-body fw-semibold">
                                Войти в аккаунт
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
