services:
  db:
    image: postgres:18
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/
    environment:
      - POSTGRES_DB=DAAS
      - POSTGRES_USER=mila
      - POSTGRES_PASSWORD=mila

  web:
    build: .
    command: ["./wait-for-it.sh", "db:5432", "--",
            "uwsgi", "--ini", "/code/config/uwsgi/uwsgi.ini"]
    restart: always
    volumes:
      - .:/code
      - socket_data:/tmp/
    environment:
      - DJANGO_SETTINGS_MODULE=DAAS.settings
      - POSTGRES_DB=DAAS
      - POSTGRES_USER=mila
      - POSTGRES_PASSWORD=mila
    depends_on:
      - db

  nginx:
    image: nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/static:/var/www/static
      - ./data/media:/var/www/media
      - socket_data:/tmp/
      - socket_data:/tmp/
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  socket_data: